  </div>
</header>

<nav class="toolbar">

    </div>
    <div class="facet-body" id="facet-body">
      <div class="facet-row">

        <div id="tool-chips" style="display:contents"></div>
      </div>

      </div>
      <div class="facet-row">
        <span class="label">配布:</span>
        <div id="dist-chips" style="display:contents"></div>
      </div>
      <div class="facet-row">
        <span class="label">提案パック:</span>
        <div id="pack-chips" style="display:contents"></div>
      </div>
    </div>
  </div>
</nav>

<main>
  <div class="grid" id="grid"></div>
  <div class="loadmore-row" id="loadmore-row" style="display:none">
    <button type="button" class="loadmore-btn" id="loadmore-btn"></button>
  </div>
  <p class="and-note">絞り込みは軸間 AND（すべての条件を満たすものを表示）</p>
  <div class="empty" id="empty">条件に合うスライドがありません。検索語を変えるか、ツール・仕組み・テーマ・導入段階・提案パック・配布の絞り込みを「すべて」に戻してください。</div>
  <noscript><p style="padding:32px;color:var(--ink-2)">このカタログの検索・一覧表示には JavaScript が必要です。スライド本体は slides/ フォルダから直接開けます。</p></noscript>
</main>

<footer class="site-footer">
  <div class="inner">
    スライドは1ファイル完結のHTMLです。ダウンロード後、ブラウザで開くだけで表示できます。

  </div>
</footer>

const STALE_DAYS = 90;
const INITIAL_VISIBLE = 30;
const LOAD_STEP = 30;
const PACKS_BY_NAME = new Map(PACKS.map(p => [p.name, p]));
const state = {
  query: "", tool: "すべて", mech: "すべて", theme: "すべて", stage: "すべて",
  dist: "すべて", proposalPack: "すべて", visibleCount: INITIAL_VISIBLE
};

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function slidePath(key) {
  return "slides/" + encodeURIComponent(key) + "/" + encodeURIComponent("解説スライド.html");
}

function isStale(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  if (isNaN(d)) return false;
  return (Date.now() - d.getTime()) / 86400000 > STALE_DAYS;
}

function axisValues(field) {
  // 語彙一覧の順を正とし、語彙外の使用中タグ（防御）を末尾に足す
  const listed = VOCAB[field] || [];
  const used = new Set();
  SLIDES.forEach(s => (s[field] || []).forEach(v => used.add(v)));
  const extras = [...used].filter(v => !listed.includes(v));
  return [...listed, ...extras];
}

function normalizeText(s) {
  return String(s).normalize('NFKC').toLowerCase();
}

// 検索対象は画面に表示される情報のみ（内部キーは対象外）
function queryMatches(s) {
  if (!state.query) return true;
  const hay = normalizeText([
    s.title, s.target, s.problems,
    (s.tools || []).join(" "), (s.mechanisms || []).join(" "), (s.themes || []).join(" ")
  ].join(" "));
  const q = normalizeText(state.query);
  return q.split(/\s+/).filter(Boolean).every(part => hay.includes(part));
}

const FIELD_STATE_KEY = { tools: "tool", mechanisms: "mech", themes: "theme", stages: "stage" };

function slideInSelectedProposalPack(s) {
  if (state.proposalPack === "すべて") return true;
  const pack = PACKS_BY_NAME.get(state.proposalPack);
  return !!pack && pack.slides.includes(s.key);
}

// 件数の母数 = 他軸・検索適用後（自軸の選択は除外）
function countFor(field, value) {
  const stateKey = FIELD_STATE_KEY[field];
  return SLIDES.filter(s => {
    if (stateKey !== "tool" && state.tool !== "すべて" && !(s.tools || []).includes(state.tool)) return false;
    if (stateKey !== "mech" && state.mech !== "すべて" && !(s.mechanisms || []).includes(state.mech)) return false;
    if (stateKey !== "theme" && state.theme !== "すべて" && !(s.themes || []).includes(state.theme)) return false;
    if (stateKey !== "stage" && state.stage !== "すべて" && !(s.stages || []).includes(state.stage)) return false;
    if (state.dist === "改善パックあり" && !s.pack) return false;
    if (!slideInSelectedProposalPack(s)) return false;
    if (!(s[field] || []).includes(value)) return false;
    return queryMatches(s);
  }).length;
}

function matches(s) {
  if (state.tool !== "すべて" && !(s.tools || []).includes(state.tool)) return false;
  if (state.mech !== "すべて" && !(s.mechanisms || []).includes(state.mech)) return false;
  if (state.theme !== "すべて" && !(s.themes || []).includes(state.theme)) return false;
  if (state.stage !== "すべて" && !(s.stages || []).includes(state.stage)) return false;
  if (state.dist === "改善パックあり" && !s.pack) return false;
  if (!slideInSelectedProposalPack(s)) return false;
  return queryMatches(s);
}

// --- URL 状態同期 ---
function stateFromURL() {
  const params = new URLSearchParams(location.search);
  state.query = params.get("q") || "";
  state.tool = params.get("tool") || "すべて";
  state.mech = params.get("mech") || "すべて";
  state.theme = params.get("theme") || "すべて";
  state.stage = params.get("stage") || "すべて";
  state.dist = params.get("dist") || "すべて";
  state.proposalPack = params.get("pack") || "すべて";
  state.visibleCount = INITIAL_VISIBLE;
}

function syncURL(mode) {
  const params = new URLSearchParams();
  if (state.query) params.set("q", state.query);
  if (state.tool !== "すべて") params.set("tool", state.tool);
  if (state.mech !== "すべて") params.set("mech", state.mech);
  if (state.theme !== "すべて") params.set("theme", state.theme);
  if (state.stage !== "すべて") params.set("stage", state.stage);
  if (state.dist !== "すべて") params.set("dist", state.dist);
  if (state.proposalPack !== "すべて") params.set("pack", state.proposalPack);
  const qs = params.toString();
  const url = location.pathname + (qs ? "?" + qs : "") + location.hash;
  if (mode === "push") history.pushState(null, "", url);
  else history.replaceState(null, "", url);
}

function selectFacet(stateKey, value) {
  state[stateKey] = value;
  state.visibleCount = INITIAL_VISIBLE;
  syncURL("push");
  render();
}

function renderChipRow(containerId, field, stateKey) {
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = "";
  ["すべて", ...axisValues(field)].forEach(value => {
    const b = document.createElement("button");
    const count = value === "すべて" ? SLIDES.length : countFor(field, value);
    const disabled = value !== "すべて" && count === 0;
    const active = state[stateKey] === value;
    b.className = "chip"
      + (active ? " active" : "")
      + (disabled ? " disabled" : "");
    b.textContent = value;
    b.setAttribute("aria-pressed", active ? "true" : "false");
    if (disabled) {
      b.title = "該当スライドは準備中です";
      b.setAttribute("aria-disabled", "true");
    } else {
      b.onclick = () => selectFacet(stateKey, value);
    }
    wrap.appendChild(b);
  });
}

function updateFacetBadge() {
  // 選択数バッジは render() が通るたびにここで state から再計算する。
  // クリック・クリア・popstate・初期化のどの経路でも state 反映後に render() 経由でここへ来るため、
  // ここ以外の場所でバッジを更新しない（重複更新の禁止）。
  const badge = document.getElementById("facet-badge");
  const count = ["tool", "mech", "theme", "stage", "dist", "proposalPack"].filter(k => state[k] !== "すべて").length;
  badge.hidden = count === 0;
  if (count > 0) badge.textContent = `${count}件選択中`;
}

// --- 導入プロンプトの遅延取得（catalog-prompts.json） ---
let promptsCache = null;
let promptsFetchPromise = null;
function loadPrompts() {
  if (promptsCache) return Promise.resolve(promptsCache);
  if (!promptsFetchPromise) {
    promptsFetchPromise = fetch("catalog-prompts.json")
      .then(res => { if (!res.ok) throw new Error("failed"); return res.json(); })
      .then(data => { promptsCache = data; return data; })
      .catch(err => { promptsFetchPromise = null; throw err; });
  }
  return promptsFetchPromise;
}

function renderFacets() {
  renderChipRow("tool-chips", "tools", "tool");
  renderChipRow("mech-chips", "mechanisms", "mech");
  renderChipRow("theme-chips", "themes", "theme");
  renderChipRow("stage-chips", "stages", "stage");
  renderDistChips();
  renderPackChips();
  updateFacetBadge();
}

// 提案パック選択時はパック内の提示順、未選択時は従来どおり登録日の新しい順
function packOrderFor(key) {
  if (state.proposalPack === "すべて") return null;
  const pack = PACKS_BY_NAME.get(state.proposalPack);
  if (!pack) return null;
  const idx = pack.slides.indexOf(key);
  return idx === -1 ? null : idx + 1;
}

function getVisibleSlides() {
  const fullList = SLIDES.filter(matches).slice();
  if (state.proposalPack !== "すべて") {
    fullList.sort((a, b) => (packOrderFor(a.key) || 0) - (packOrderFor(b.key) || 0));
  } else {
    fullList.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  }
  const visibleList = fullList.slice(0, state.visibleCount);
  return { fullList, visibleList };
}

function updateSortLabel() {

}

function renderStatus(fullList, visibleList) {
  updateSortLabel();
  document.getElementById("empty").style.display = fullList.length ? "none" : "block";
  document.getElementById("hit-count").textContent = `${fullList.length}件中 ${visibleList.length}件を表示`;

  const remaining = fullList.length - visibleList.length;
  const loadmoreRow = document.getElementById("loadmore-row");
  const loadmoreBtn = document.getElementById("loadmore-btn");
  if (remaining > 0) {
    loadmoreRow.style.display = "";
    loadmoreBtn.textContent = `もっと見る（残り ${remaining} 枚）`;
  } else {
    loadmoreRow.style.display = "none";
  }
}

function render() {
  renderFacets();
  const { fullList, visibleList } = getVisibleSlides();
  renderGrid(visibleList);
  renderStatus(fullList, visibleList);
}

function bindCardEvents() {
  document.querySelectorAll(".card-actions button.act[data-toggle]").forEach(btn => {
    btn.addEventListener("click", () => {
      const card = btn.closest(".card");
      const panel = card.querySelector(".import-panel");
      if (!panel) return;
      const open = panel.classList.toggle("open");
      btn.setAttribute("aria-expanded", open ? "true" : "false");
      if (open) {
        const pre = panel.querySelector("[data-prompt-text]");
        const key = panel.dataset.key;
        if (pre && !pre.dataset.loaded) {
          loadPrompts().then(data => {
            pre.textContent = (data && data[key]) || "";
            pre.dataset.loaded = "true";
          }).catch(() => {
            pre.textContent = "オフラインでは読み込めません";
          });
        }
      }
    });
  });
  document.querySelectorAll(".copy-btn[data-copy]").forEach(btn => {
    btn.addEventListener("click", () => {
      const card = btn.closest(".card");
      const pre = card.querySelector(".prompt-box pre");
      if (!pre) return;
      const text = pre.textContent;
      const feedback = btn.parentElement.querySelector(".copy-feedback");
      const showFeedback = () => {
        if (!feedback) return;
        feedback.classList.add("show");
        setTimeout(() => feedback.classList.remove("show"), 1500);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(showFeedback);
      } else {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); } catch (e) {}
        document.body.removeChild(ta);
        showFeedback();
      }
    });
  });
  document.querySelectorAll(".tag[data-axis]").forEach(btn => {
    btn.addEventListener("click", () => {
      const axis = btn.dataset.axis;
      const value = btn.dataset.value;
      const next = state[axis] === value ? "すべて" : value;
      selectFacet(axis, next);
    });
  });
}

function currentTheme() {
  return document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
}
function applyThemeIcon() {
  document.getElementById("theme-toggle-icon").textContent = currentTheme() === "dark" ? "light_mode" : "dark_mode";
}
document.getElementById("theme-toggle").addEventListener("click", () => {
  const next = currentTheme() === "dark" ? "light" : "dark";
  if (next === "dark") document.documentElement.setAttribute("data-theme", "dark");
  else document.documentElement.removeAttribute("data-theme");
  try { localStorage.setItem("theme", next); } catch (e) {}
  applyThemeIcon();
});

const facetBody = document.getElementById("facet-body");
const facetToggleBtn = document.getElementById("facet-toggle");
function setFacetOpen(open) {
  facetBody.hidden = !open;
  facetToggleBtn.setAttribute("aria-expanded", open ? "true" : "false");
}
facetToggleBtn.addEventListener("click", () => setFacetOpen(!!facetBody.hidden));
setFacetOpen(!(window.matchMedia && window.matchMedia("(max-width: 640px)").matches));

document.getElementById("facet-clear").addEventListener("click", () => {
  state.tool = "すべて";
  state.mech = "すべて";
  state.theme = "すべて";
  state.stage = "すべて";
  state.dist = "すべて";
  state.proposalPack = "すべて";
  state.visibleCount = INITIAL_VISIBLE;
  syncURL("push");
  render();
});

document.getElementById("loadmore-btn").addEventListener("click", () => {
  state.visibleCount += LOAD_STEP;
  render();
});

window.addEventListener("popstate", () => {
  stateFromURL();
  document.getElementById("search").value = state.query;
  render();
});

// --- 検索（NFKC正規化 + 150msデバウンス） ---
let searchDebounceTimer = null;
document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value;
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    state.query = value.trim();
    state.visibleCount = INITIAL_VISIBLE;
    syncURL("replace");
    render();
  }, 150);
});

// --- 初期化 ---
stateFromURL();
document.getElementById("search").value = state.query;
render();
</script>
</body>
</html>
