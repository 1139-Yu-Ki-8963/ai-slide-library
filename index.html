(function () {
  try {
    var saved = localStorage.getItem("theme");
    var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;

    if (theme === "dark") document.documentElement.setAttribute("data-theme", "dark");
  } catch (e) {}
})();

</main>

const STALE_DAYS = 90;
const INITIAL_VISIBLE = 30;
const LOAD_STEP = 30;
const PACKS_BY_NAME = new Map(PACKS.map(p => [p.name, p]));
const SLIDE_BY_KEY = new Map(SLIDES.map(s => [s.key, s]));
// バリアントグループのメンバーキー → 所属グループ の逆引き（束ねカード表示用）
const MEMBER_KEY_TO_GROUP = new Map();
VARIANT_GROUPS.forEach(g => g.members.forEach(m => MEMBER_KEY_TO_GROUP.set(m.key, g)));
const state = {
  query: "", tool: "すべて", mech: "すべて", theme: "すべて", stage: "すべて",
  dist: "すべて", template: "すべて", proposalPack: "すべて", visibleCount: INITIAL_VISIBLE
};

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function slidePath(key) {
  return "slides/" + encodeURIComponent(key) + "/" + encodeURIComponent("解説スライド.html");
}

function isStale(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  if (isNaN(d)) return false;
  return (Date.now() - d.getTime()) / 86400000 > STALE_DAYS;
}

function axisValues(field) {
  // 語彙一覧の順を正とし、語彙外の使用中タグ（防御）を末尾に足す
  const listed = VOCAB[field] || [];
  const used = new Set();
  SLIDES.forEach(s => (s[field] || []).forEach(v => used.add(v)));
  const extras = [...used].filter(v => !listed.includes(v));
  return [...listed, ...extras];
}

function normalizeText(s) {
  return String(s).normalize('NFKC').toLowerCase();
}

// 検索対象は画面に表示される情報のみ（内部キーは対象外）
function queryMatches(s) {
  if (!state.query) return true;
  const hay = normalizeText([
    s.title, s.target, s.problems,
    (s.tools || []).join(" "), (s.mechanisms || []).join(" "), (s.themes || []).join(" ")
  ].join(" "));
  const q = normalizeText(state.query);
  return q.split(/\s+/).filter(Boolean).every(part => hay.includes(part));
}

const FIELD_STATE_KEY = { tools: "tool", mechanisms: "mech", themes: "theme", stages: "stage" };

function slideInSelectedProposalPack(s) {
  if (state.proposalPack === "すべて") return true;
  const pack = PACKS_BY_NAME.get(state.proposalPack);
  return !!pack && pack.slides.includes(s.key);
}

// 件数の母数 = 他軸・検索適用後（自軸の選択は除外）
function countFor(field, value) {
  const stateKey = FIELD_STATE_KEY[field];
  return SLIDES.filter(s => {
    if (stateKey !== "tool" && state.tool !== "すべて" && !(s.tools || []).includes(state.tool)) return false;
    if (stateKey !== "mech" && state.mech !== "すべて" && !(s.mechanisms || []).includes(state.mech)) return false;
    if (stateKey !== "theme" && state.theme !== "すべて" && !(s.themes || []).includes(state.theme)) return false;
    if (stateKey !== "stage" && state.stage !== "すべて" && !(s.stages || []).includes(state.stage)) return false;
    if (state.dist === "改善パックあり" && !s.pack) return false;
    if (state.template !== "すべて" && (state.template === "テンプレートあり" ? !s.template : s.template !== state.template)) return false;
    if (!slideInSelectedProposalPack(s)) return false;
    if (!(s[field] || []).includes(value)) return false;
    return queryMatches(s);
  }).length;
}

function matches(s) {
  if (state.tool !== "すべて" && !(s.tools || []).includes(state.tool)) return false;
  if (state.mech !== "すべて" && !(s.mechanisms || []).includes(state.mech)) return false;
  if (state.theme !== "すべて" && !(s.themes || []).includes(state.theme)) return false;
  if (state.stage !== "すべて" && !(s.stages || []).includes(state.stage)) return false;
  if (state.dist === "改善パックあり" && !s.pack) return false;
  if (state.template !== "すべて" && (state.template === "テンプレートあり" ? !s.template : s.template !== state.template)) return false;
  if (!slideInSelectedProposalPack(s)) return false;
  return queryMatches(s);
}

// --- URL 状態同期 ---
function stateFromURL() {
  const params = new URLSearchParams(location.search);
  state.query = params.get("q") || "";
  state.tool = params.get("tool") || "すべて";
  state.mech = params.get("mech") || "すべて";
  state.theme = params.get("theme") || "すべて";
  state.stage = params.get("stage") || "すべて";
  state.dist = params.get("dist") || "すべて";
  state.template = params.get("tmpl") || "すべて";
  // 旧値の後方互換
  if (state.template === "図解型") state.template = "すべて";
  if (state.template === "テンプレートあり") state.template = "すべて";
  state.proposalPack = params.get("pack") || "すべて";
  state.visibleCount = INITIAL_VISIBLE;
}

function syncURL(mode) {
  const params = new URLSearchParams();
  if (state.query) params.set("q", state.query);
  if (state.tool !== "すべて") params.set("tool", state.tool);
  if (state.mech !== "すべて") params.set("mech", state.mech);
  if (state.theme !== "すべて") params.set("theme", state.theme);
  if (state.stage !== "すべて") params.set("stage", state.stage);
  if (state.dist !== "すべて") params.set("dist", state.dist);
  if (state.template !== "すべて") params.set("tmpl", state.template);
  if (state.proposalPack !== "すべて") params.set("pack", state.proposalPack);
  const qs = params.toString();
  const url = location.pathname + (qs ? "?" + qs : "") + location.hash;
  if (mode === "push") history.pushState(null, "", url);
  else history.replaceState(null, "", url);
}

function selectFacet(stateKey, value) {
  state[stateKey] = value;
  state.visibleCount = INITIAL_VISIBLE;
  syncURL("push");
  render();
}

function renderChipRow(containerId, field, stateKey) {
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = "";
  ["すべて", ...axisValues(field)].forEach(value => {
    const b = document.createElement("button");
    const count = value === "すべて" ? SLIDES.length : countFor(field, value);
    const disabled = value !== "すべて" && count === 0;
    const active = state[stateKey] === value;
    b.className = "chip"
      + (active ? " active" : "")
      + (disabled ? " disabled" : "");
    b.textContent = value;
    b.setAttribute("aria-pressed", active ? "true" : "false");
    if (disabled) {
      b.title = "該当スライドは準備中です";
      b.setAttribute("aria-disabled", "true");
    } else {
      b.onclick = () => selectFacet(stateKey, value);
    }
    wrap.appendChild(b);
  });
}

function renderDistChips() {

  wrap.innerHTML = "";

    { value: "すべて", count: SLIDES.length },
    { value: "改善パックあり", count: SLIDES.filter(s => s.pack).length }
  ].forEach(({ value, count }) => {
    const b = document.createElement("button");

    const active = state.dist === value;

      + (active ? " active" : "")
      + (disabled ? " disabled" : "");
    b.textContent = value;
    b.setAttribute("aria-pressed", active ? "true" : "false");
    if (disabled) {

      b.setAttribute("aria-disabled", "true");

function renderPackChips() {
  // 「配布」軸（改善パックあり = s.pack の boolean フラグ）とは別物。
  // こちらは docs/スライド蓄積簿.md 「## 提案パック定義」由来の PACKS（提示順付きスライド束）の選択 UI。
  const wrap = document.getElementById("pack-chips");
  wrap.innerHTML = "";
  [
    { value: "すべて", count: SLIDES.length },
    ...PACKS.map(p => ({ value: p.name, count: p.slides.length }))
  ].forEach(({ value, count }) => {
    const b = document.createElement("button");
    const disabled = value !== "すべて" && count === 0;
    const active = state.proposalPack === value;
    b.className = "chip"
      + (active ? " active" : "")
      + (disabled ? " disabled" : "");
    b.textContent = value;
    b.setAttribute("aria-pressed", active ? "true" : "false");
    if (disabled) {
      b.title = "該当スライドは準備中です";
      b.setAttribute("aria-disabled", "true");
    } else {
      b.onclick = () => selectFacet("proposalPack", value);
    }
    wrap.appendChild(b);
  });
}

function updateFacetBadge() {
  // 選択数バッジは render() が通るたびにここで state から再計算する。
  // クリック・クリア・popstate・初期化のどの経路でも state 反映後に render() 経由でここへ来るため、
  // ここ以外の場所でバッジを更新しない（重複更新の禁止）。
  const badge = document.getElementById("facet-badge");
  const count = ["tool", "mech", "theme", "stage", "dist", "template", "proposalPack"].filter(k => state[k] !== "すべて").length;
  badge.hidden = count === 0;
  if (count > 0) badge.textContent = `${count}件選択中`;
}

// --- 導入プロンプトの遅延取得（catalog-prompts.json） ---
let promptsCache = null;
let promptsFetchPromise = null;
function loadPrompts() {
  if (promptsCache) return Promise.resolve(promptsCache);
  if (!promptsFetchPromise) {
    promptsFetchPromise = fetch("catalog-prompts.json")
      .then(res => { if (!res.ok) throw new Error("failed"); return res.json(); })
      .then(data => { promptsCache = data; return data; })
      .catch(err => { promptsFetchPromise = null; throw err; });
  }
  return promptsFetchPromise;
}

function renderFacets() {
  renderChipRow("tool-chips", "tools", "tool");
  renderChipRow("mech-chips", "mechanisms", "mech");
  renderChipRow("theme-chips", "themes", "theme");
  renderChipRow("stage-chips", "stages", "stage");
  renderDistChips();
  renderTemplateChips();
  renderPackChips();
  updateFacetBadge();
}

// 提案パック選択時はパック内の提示順、未選択時は従来どおり登録日の新しい順
function packOrderFor(key) {
  if (state.proposalPack === "すべて") return null;
  const pack = PACKS_BY_NAME.get(state.proposalPack);
  if (!pack) return null;
  const idx = pack.slides.indexOf(key);
  return idx === -1 ? null : idx + 1;
}

// 束ねカード（isBundle）／通常カードのどちらでも提示順を引けるようにするラッパー。
// 束ねカードはメンバーキーのうちパックに載っているものを探して順序を採用する。
function packOrderForItem(item) {
  if (!item.isBundle) return packOrderFor(item.key);
  if (state.proposalPack === "すべて") return null;
  const pack = PACKS_BY_NAME.get(state.proposalPack);
  if (!pack) return null;
  for (const m of item.group.members) {
    const idx = pack.slides.indexOf(m.key);
    if (idx !== -1) return idx + 1;
  }
  return null;
}

function unionField(memberSlides, field) {
  const set = new Set();
  memberSlides.forEach(s => (s[field] || []).forEach(v => set.add(v)));
  return [...set];
}

// バリアントグループの代表（canonical）情報を軸に、メンバー全員のタグを合成した束ねカード用オブジェクトを作る
function buildBundleSlide(group) {
  const canonical = SLIDE_BY_KEY.get(group.canonical);
  const memberSlides = group.members.map(m => SLIDE_BY_KEY.get(m.key)).filter(Boolean);
  const labelText = group.members.map(m => m.label).join(" / ");
  const maxDate = memberSlides.reduce((max, s) => ((s.date || "") > max ? (s.date || "") : max), "");
  return {
    key: group.canonical,
    isBundle: true,
    group,
    title: `${group.base_name}（${labelText}）`,
    target: canonical.target,
    problems: canonical.problems,
    tools: unionField(memberSlides, "tools"),
    mechanisms: unionField(memberSlides, "mechanisms"),
    themes: unionField(memberSlides, "themes"),
    stages: unionField(memberSlides, "stages"),
    entities: canonical.entities,
    pack: canonical.pack,
    has_prompt: canonical.has_prompt,
    template: canonical.template,
    date: maxDate || canonical.date
  };
}

// SLIDES を「束ね対象のグループは代表 1 件（束ねカード）にまとめ、それ以外は従来どおり」の表示リストへ変換する。
// マッチ判定はグループ内メンバーのいずれかが matches() を満たせばグループ全体をヒットとみなす（OR 判定）。
function buildDisplayList() {
  const processedGroups = new Set();
  const result = [];
  SLIDES.forEach(s => {
    const group = MEMBER_KEY_TO_GROUP.get(s.key);
    if (!group) {
      if (matches(s)) result.push(s);
      return;
    }
    if (processedGroups.has(group)) return;
    processedGroups.add(group);
    const groupHits = group.members.some(m => {
      const memberSlide = SLIDE_BY_KEY.get(m.key);
      return memberSlide && matches(memberSlide);
    });
    if (groupHits) result.push(buildBundleSlide(group));
  });
  return result;
}

function getVisibleSlides() {
  const fullList = buildDisplayList();
  if (state.proposalPack !== "すべて") {
    fullList.sort((a, b) => (packOrderForItem(a) || 0) - (packOrderForItem(b) || 0));
  } else {
    fullList.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
  }
  const visibleList = fullList.slice(0, state.visibleCount);
  return { fullList, visibleList };
}

// 束ねカードの「開く:」「ダウンロード:」行。開くはメンバーごとに統合スライド内の該当タブ（#slug）へ、
// ダウンロードはメンバーラベル付きのファイル名で統合スライドそのものを保存する。
function renderVariantLinkRows(bundle) {
  const canonicalPath = slidePath(bundle.group.canonical);
  const openLinks = bundle.group.members
    .map(m => `<a class="variant-pill" href="${canonicalPath}#${esc(m.slug)}" target="_blank" rel="noopener">${esc(m.label)}</a>`)
    .join("");
  const downloadLinks = bundle.group.members
    .map(m => `<a class="variant-pill" href="${canonicalPath}" download="${esc(`${bundle.group.base_name}（${m.label}版）.html`)}">${esc(m.label)}</a>`)
    .join("");
  return `
      <div class="variant-link-row"><span class="variant-link-label">開く:</span>${openLinks}</div>
      <div class="variant-link-row"><span class="variant-link-label">ダウンロード:</span>${downloadLinks}</div>`;
}

function renderGrid(visibleList) {
  const grid = document.getElementById("grid");
  grid.innerHTML = visibleList.map(s => {
    const canonicalKey = s.isBundle ? s.group.canonical : s.key;
    const path = slidePath(canonicalKey);
    const thumbPath = "slides/" + encodeURIComponent(canonicalKey) + "/" + encodeURIComponent("サムネイル.png");
    const toolTags = (s.tools || []).map(t => `<button type="button" class="tag" data-axis="tool" data-value="${esc(t)}">${esc(t)}</button>`).join("");
    const mechTags = (s.mechanisms || []).map(t => `<button type="button" class="tag mech" data-axis="mech" data-value="${esc(t)}">${esc(t)}</button>`).join("");
    const themeTags = (s.themes || []).map(t => `<button type="button" class="tag theme" data-axis="theme" data-value="${esc(t)}">${esc(t)}</button>`).join("");
    const stageTags = (s.stages || []).map(t => `<button type="button" class="tag stage" data-axis="stage" data-value="${esc(t)}">${esc(t)}</button>`).join("");
    const stale = isStale(s.date) ? `<span class="stale">登録から${STALE_DAYS}日超</span>` : "";
    const packBadge = s.pack ? `<span class="pack-badge">改善パック</span>` : "";
    const packOrder = packOrderForItem(s);
    const packOrderBadge = packOrder ? `<span class="pack-order-badge">${packOrder}</span>` : "";
    const variantBadge = s.isBundle
      ? `<span class="variant-badge">${s.group.members.length} ${s.group.kind === "tool" ? "ツール対応" : "表示形式"}</span>`
      : "";
    const hasPrompt = !!s.has_prompt;
    const packZipPath = "slides/" + encodeURIComponent(canonicalKey) + "/pack.zip";
    const importButton = hasPrompt
      ? `<button type="button" class="act" data-toggle aria-expanded="false"><span class="material-symbols-outlined">terminal</span>導入する</button>`
      : "";
    const packLink = s.pack
      ? `<a class="act" href="${packZipPath}" download><span class="material-symbols-outlined">download</span>改善パック</a>`
      : "";
    // 束ねカードは一括「スライドHTML」ダウンロードボタンを非表示にし、ツール別ダウンロード行（下部）で代替する
    const slideHtmlDownload = s.isBundle
      ? ""
      : `<a class="act" href="${path}" download="${esc(s.key)}.html"><span class="material-symbols-outlined">download</span>スライドHTML</a>`;
    const variantLinkRows = s.isBundle ? renderVariantLinkRows(s) : "";
    const entityList = (s.entities || []).length
      ? `<h3>導入されるもの</h3><ul>${(s.entities || []).map(e => `<li>${esc(e)}</li>`).join("")}</ul>`
      : "";
    const importNote = s.pack
      ? `<p class="import-note">手動で導入する場合は「改善パック（zip）」からファイル一式を取得できます。</p>`
      : `<p class="import-note">この仕組みはスライドの内容を仕様として、あなたの環境に合わせて構築します。</p>`;
    const importPanel = hasPrompt ? `
      <div class="import-panel" data-key="${esc(canonicalKey)}">
        <h3>導入プロンプト — コピーして、あなたの AI に貼るだけ</h3>
        <p class="lead">貼り付けられた AI が、前提確認・配置（または構築）・検証まで実行します。</p>
        <div class="prompt-box">
          <pre data-prompt-text>読み込み中…</pre>
          <button type="button" class="copy-btn" data-copy><span class="material-symbols-outlined">content_copy</span>コピー</button>
          <span class="copy-feedback">コピーしました</span>
        </div>
        ${entityList}
        ${importNote}
      </div>` : "";
    return `
    <article class="card">
      <div class="thumb">
        <img class="thumb-img" loading="lazy" src="${thumbPath}" alt="${esc(s.title)} のサムネイル" width="640" height="360" onerror="this.closest('.thumb').classList.add('is-fallback')">
        <div class="thumb-fallback"><span class="material-symbols-outlined">image</span><span class="fallback-label">サムネイル準備中</span></div>
        <a class="thumb-link" href="${path}" target="_blank" rel="noopener" aria-label="${esc(s.title)} を全画面で開く"></a>
        ${packBadge}
        ${packOrderBadge}
        ${variantBadge}
      </div>
      <div class="card-body">
        <h2 class="card-title">${esc(s.title)}</h2>
        <p class="card-target">${esc(s.target)}</p>
        <p class="card-problem">${esc(s.problems)}</p>
        <div class="meta-row">${toolTags}${mechTags}${themeTags}${stageTags}${stale}<span class="date">${esc(s.date)} 登録</span></div>
      </div>
      <div class="card-actions">
        ${importButton}
        ${slideHtmlDownload}
        ${packLink}
      </div>
      ${variantLinkRows}
      ${importPanel}
    </article>`;
  }).join("");
  bindCardEvents();
}

function updateSortLabel() {
  const label = state.proposalPack !== "すべて"
    ? `並び順: 提示順（${state.proposalPack}）`
    : "並び順: 登録が新しい順";
  document.querySelector(".sort-label").textContent = label;
}

function renderStatus(fullList, visibleList) {
  updateSortLabel();
  document.getElementById("empty").style.display = fullList.length ? "none" : "block";
  document.getElementById("hit-count").textContent = `${fullList.length}件中 ${visibleList.length}件を表示`;

  const remaining = fullList.length - visibleList.length;
  const loadmoreRow = document.getElementById("loadmore-row");
  const loadmoreBtn = document.getElementById("loadmore-btn");
  if (remaining > 0) {
    loadmoreRow.style.display = "";
    loadmoreBtn.textContent = `もっと見る（残り ${remaining} 枚）`;
  } else {
    loadmoreRow.style.display = "none";
  }
}

function render() {
  renderFacets();
  const { fullList, visibleList } = getVisibleSlides();
  renderGrid(visibleList);
  renderStatus(fullList, visibleList);
}

function bindCardEvents() {
  document.querySelectorAll(".card-actions button.act[data-toggle]").forEach(btn => {
    btn.addEventListener("click", () => {
      const card = btn.closest(".card");
      const panel = card.querySelector(".import-panel");
      if (!panel) return;
      const open = panel.classList.toggle("open");
      btn.setAttribute("aria-expanded", open ? "true" : "false");
      if (open) {
        const pre = panel.querySelector("[data-prompt-text]");
        const key = panel.dataset.key;
        if (pre && !pre.dataset.loaded) {
          loadPrompts().then(data => {
            pre.textContent = (data && data[key]) || "";
            pre.dataset.loaded = "true";
          }).catch(() => {
            pre.textContent = "オフラインでは読み込めません";
          });
        }
      }
    });
  });
  document.querySelectorAll(".copy-btn[data-copy]").forEach(btn => {
    btn.addEventListener("click", () => {
      const card = btn.closest(".card");
      const pre = card.querySelector(".prompt-box pre");
      if (!pre) return;
      const text = pre.textContent;
      const feedback = btn.parentElement.querySelector(".copy-feedback");
      const showFeedback = () => {
        if (!feedback) return;
        feedback.classList.add("show");
        setTimeout(() => feedback.classList.remove("show"), 1500);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(showFeedback);
      } else {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); } catch (e) {}
        document.body.removeChild(ta);
        showFeedback();
      }
    });
  });
  document.querySelectorAll(".tag[data-axis]").forEach(btn => {
    btn.addEventListener("click", () => {
      const axis = btn.dataset.axis;
      const value = btn.dataset.value;
      const next = state[axis] === value ? "すべて" : value;
      selectFacet(axis, next);
    });
  });
}

// --- ダークモード切替 ---
function currentTheme() {
  return document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
}
function applyThemeIcon() {
  document.getElementById("theme-toggle-icon").textContent = currentTheme() === "dark" ? "light_mode" : "dark_mode";
}
document.getElementById("theme-toggle").addEventListener("click", () => {
  const next = currentTheme() === "dark" ? "light" : "dark";
  if (next === "dark") document.documentElement.setAttribute("data-theme", "dark");
  else document.documentElement.removeAttribute("data-theme");
  try { localStorage.setItem("theme", next); } catch (e) {}
  applyThemeIcon();
});
applyThemeIcon();

// --- 絞り込みパネルの開閉 ---
const facetBody = document.getElementById("facet-body");
const facetToggleBtn = document.getElementById("facet-toggle");
function setFacetOpen(open) {
  facetBody.hidden = !open;
  facetToggleBtn.setAttribute("aria-expanded", open ? "true" : "false");
}
facetToggleBtn.addEventListener("click", () => setFacetOpen(!!facetBody.hidden));
setFacetOpen(!(window.matchMedia && window.matchMedia("(max-width: 640px)").matches));

document.getElementById("facet-clear").addEventListener("click", () => {
  state.tool = "すべて";
  state.mech = "すべて";
  state.theme = "すべて";
  state.stage = "すべて";
  state.dist = "すべて";
  state.template = "すべて";
  state.proposalPack = "すべて";
  state.visibleCount = INITIAL_VISIBLE;
  syncURL("push");
  render();
});

document.getElementById("loadmore-btn").addEventListener("click", () => {
  state.visibleCount += LOAD_STEP;
  render();
});

window.addEventListener("popstate", () => {
  stateFromURL();
  document.getElementById("search").value = state.query;
  render();
});

// --- 検索（NFKC正規化 + 150msデバウンス） ---
let searchDebounceTimer = null;
document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value;
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    state.query = value.trim();
    state.visibleCount = INITIAL_VISIBLE;
    syncURL("replace");
    render();
  }, 150);
});

// --- 初期化 ---
stateFromURL();
document.getElementById("search").value = state.query;
render();
</script>
