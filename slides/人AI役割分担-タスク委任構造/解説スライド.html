<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIに任せる — 定型レポートのタスク委任構造</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--text:#1a1a1a;--text-sub:#666;
  --human-bg:#1a1a1a;--human-text:#fff;
  --ai-bg:#fff;--ai-text:#1a1a1a;--ai-border:#ccc;
  --arrow:#3b7dd8;--lane-label:#888;
  --msg-bg:#1a1a1a;--msg-text:#fff;
  --divider:#e0e0e0;
  --feedback:#aaa;
}
html{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;background:var(--bg);color:var(--text)}
body{width:100vw;height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;background:var(--bg)}
.slide{width:1280px;height:720px;position:relative;display:flex;flex-direction:column;padding:48px 56px 0;background:var(--bg)}

.header{margin-bottom:32px}
.title{font-size:28px;font-weight:700;letter-spacing:.02em;line-height:1.3}
.title .tag{color:var(--text-sub);font-weight:400}
.subtitle{font-size:15px;color:var(--text-sub);margin-top:6px;font-style:italic}

.diagram{flex:1;display:flex;flex-direction:column;position:relative}

.feedback-area{height:28px;position:relative;margin-bottom:4px}
.feedback-label{position:absolute;left:170px;top:4px;font-size:11px;color:var(--feedback);letter-spacing:.03em}

.lanes-grid{
  flex:1;
  display:grid;
  grid-template-columns:50px 1fr 56px 1fr 56px 1fr 56px 1fr;
  grid-template-rows:auto 56px auto;
  align-items:center;
}

.lane-label{font-size:14px;font-weight:600;color:var(--lane-label);text-align:center}
.label-human{grid-column:1;grid-row:1}
.label-ai{grid-column:1;grid-row:3}

.card{width:100%;padding:20px 20px 16px}
.card-human{background:var(--human-bg);color:var(--human-text)}
.card-ai{background:var(--ai-bg);color:var(--ai-text);border:1.5px solid var(--ai-border)}
.card-num{font-size:12px;opacity:.6;margin-bottom:8px;font-variant-numeric:tabular-nums}
.card-title{font-size:16px;font-weight:600;line-height:1.4;margin-bottom:6px}
.card-desc{font-size:12px;opacity:.7;line-height:1.5}

#card01{grid-column:2;grid-row:1}
#card05{grid-column:8;grid-row:1}
#card02{grid-column:2;grid-row:3}
#card03{grid-column:4;grid-row:3}
#card04{grid-column:6;grid-row:3}

.arrow-h{grid-row:3;display:flex;align-items:center;justify-content:center}
#arrow23{grid-column:3}
#arrow34{grid-column:5}

.connector-divider{grid-column:1/-1;grid-row:2;height:1px;background:var(--divider);align-self:center}
.arrow-v{grid-row:2;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;background:var(--bg)}
#arrow-down{grid-column:2}
.arrow-up-corner{grid-column:6/9;grid-row:2;position:relative;z-index:1;background:var(--bg)}

.message-bar{height:56px;background:var(--msg-bg);color:var(--msg-text);display:flex;align-items:center;padding:0 32px;font-size:14px;line-height:1.6;letter-spacing:.03em;margin:0 -56px;width:calc(100% + 112px)}
</style>
</head>
<body>
<div class="slide">
  <div class="header">
    <div class="title"><span class="tag">A</span>｜AIに任せる — アクセス解析の定型レポート</div>
    <div class="subtitle">ルールが明確で、間違えてもやり直せる仕事</div>
  </div>

  <div class="diagram">
    <!-- フィードバックループの破線ラベル -->
    <div class="feedback-area">
      <span class="feedback-label">月次などでルールを更新</span>
      <svg width="100%" height="28" style="position:absolute;top:0;left:0;pointer-events:none">
        <defs><marker id="fb" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="var(--feedback)"/></marker></defs>
        <path d="M 1049,24 L 1049,4 L 169,4 L 169,24" fill="none" stroke="var(--feedback)" stroke-width="1.2" stroke-dasharray="6,4" marker-end="url(#fb)"/>
      </svg>
    </div>

    <div class="lanes-grid">
      <div class="lane-label label-human">人</div>
      <div class="lane-label label-ai">AI</div>

      <div class="card card-human" id="card01">
        <div class="card-num">01</div>
        <div class="card-title">ルールを設計</div>
        <div class="card-desc">指標・手順・出力形式（初回のみ）</div>
      </div>
      <div class="card card-human" id="card05">
        <div class="card-num">05</div>
        <div class="card-title">定期的に見直す</div>
        <div class="card-desc">目的に合っているか点検</div>
      </div>

      <div class="card card-ai" id="card02">
        <div class="card-num">02</div>
        <div class="card-title">データ取得・集計</div>
        <div class="card-desc">媒体・ツールから自動取得</div>
      </div>
      <div class="arrow-h" id="arrow23">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M5,12 L17,12 M13,7 L18,12 L13,17" fill="none" stroke="var(--arrow)" stroke-width="1.5"/></svg>
      </div>
      <div class="card card-ai" id="card03">
        <div class="card-num">03</div>
        <div class="card-title">変化点を抽出</div>
        <div class="card-desc">前週比・異常値を検出</div>
      </div>
      <div class="arrow-h" id="arrow34">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M5,12 L17,12 M13,7 L18,12 L13,17" fill="none" stroke="var(--arrow)" stroke-width="1.5"/></svg>
      </div>
      <div class="card card-ai" id="card04">
        <div class="card-num">04</div>
        <div class="card-title">レポート出力</div>
        <div class="card-desc">仮説候補つきで自動作成</div>
      </div>

      <div class="connector-divider"></div>
      <div class="arrow-v" id="arrow-down">
        <svg width="24" height="24" viewBox="0 0 24 24"><path d="M12,5 L12,17 M7,13 L12,18 L17,13" fill="none" stroke="var(--arrow)" stroke-width="1.5"/></svg>
      </div>
      <div class="arrow-up-corner" id="arrow-up">
        <svg width="100%" height="56" viewBox="0 0 531 56" preserveAspectRatio="none" style="display:block">
          <path d="M119,56 L119,28 L412,28 L412,10" fill="none" stroke="var(--arrow)" stroke-width="1.5"/>
          <path d="M406,10 L412,4 L418,10" fill="none" stroke="var(--arrow)" stroke-width="1.5"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="message-bar">日々の処理はAIが回す。人の仕事は、最初の設計と、目的に照らした見直しに集約される。</div>
</div>
</body>
</html>
