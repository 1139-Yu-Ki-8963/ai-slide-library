<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIに任せる — 定型レポートのタスク委任構造</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;color:#1a1a1a}
body{display:flex;justify-content:center;align-items:center}
.s{width:1280px;height:720px;position:relative;background:#fff}

.ttl{position:absolute;top:40px;left:60px;font-size:28px;font-weight:700;letter-spacing:.01em}
.ttl b{font-weight:700}
.ttl span{font-weight:400;color:#666}
.sub{position:absolute;top:82px;left:60px;font-size:14px;color:#888;font-style:italic}

.ai-band{position:absolute;top:380px;left:0;right:0;bottom:54px;background:#f0f0f0;z-index:0}

.card{position:absolute;padding:18px 22px 14px;z-index:1}
.h{background:#1a1a1a;color:#fff}
.a{background:#fff;color:#1a1a1a;border:1.5px solid #ccc}
.cn{font-size:11px;opacity:.5;margin-bottom:6px}
.ct{font-size:15px;font-weight:600;margin-bottom:4px;line-height:1.35}
.cd{font-size:11px;opacity:.6;line-height:1.5}

.c01{top:190px;left:90px;width:250px}
.c05{top:190px;right:80px;width:230px}
.c02{top:440px;left:340px;width:210px}
.c03{top:440px;left:590px;width:210px}
.c04{top:440px;left:840px;width:210px}

.ll{position:absolute;font-size:14px;font-weight:600;color:#aaa}
.ll1{top:250px;left:50px}
.ll2{top:500px;left:50px}

.msg{position:absolute;bottom:0;left:0;right:0;height:54px;background:#1a1a1a;color:#fff;display:flex;align-items:center;padding:0 60px;font-size:13px;letter-spacing:.02em;z-index:1}

svg.overlay{position:absolute;top:0;left:0;width:1280px;height:720px;pointer-events:none;z-index:2}
</style>
</head>
<body>
<div class="s">
  <div class="ttl"><span>A</span>｜<b>AIに任せる — アクセス解析の定型レポート</b></div>
  <div class="sub">ルールが明確で、間違えてもやり直せる仕事</div>

  <div class="ai-band"></div>

  <div class="ll ll1">人</div>
  <div class="ll ll2">AI</div>

  <div class="card h c01"><div class="cn">01</div><div class="ct">ルールを設計</div><div class="cd">指標・手順・出力形式（初回のみ）</div></div>
  <div class="card h c05"><div class="cn">05</div><div class="ct">定期的に見直す</div><div class="cd">目的に合っているか点検</div></div>
  <div class="card a c02"><div class="cn">02</div><div class="ct">データ取得・集計</div><div class="cd">媒体・ツールから自動取得</div></div>
  <div class="card a c03"><div class="cn">03</div><div class="ct">変化点を抽出</div><div class="cd">前週比・異常値を検出</div></div>
  <div class="card a c04"><div class="cn">04</div><div class="ct">レポート出力</div><div class="cd">仮説候補つきで自動作成</div></div>

  <svg class="overlay" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="ah" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8Z" fill="#1a1a1a"/></marker>
      <marker id="ag" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8Z" fill="#999"/></marker>
      <marker id="af" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7Z" fill="#aaa"/></marker>
    </defs>

    <!-- フィードバック破線: 05 → 01 (上部を通って戻る) -->
    <text x="310" y="142" fill="#aaa" font-size="12" font-family="Hiragino Kaku Gothic ProN,system-ui">月次などでルールを更新</text>
    <path d="M 1100,190 L 1100,130 L 215,130 L 215,188" fill="none" stroke="#aaa" stroke-width="1.2" stroke-dasharray="6,4" marker-end="url(#af)"/>

    <!-- 01 → 02: 縦の実線（01の下端 → 横 → 02の上端） -->
    <path d="M 215,330 L 215,390 L 445,390 L 445,440" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#ah)"/>

    <!-- 02 → 03: 横矢印 -->
    <path d="M 550,500 L 588,500" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#ag)"/>

    <!-- 03 → 04: 横矢印 -->
    <path d="M 800,500 L 838,500" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#ag)"/>

    <!-- 04 → 05: 縦の実線（04の上端 → 横 → 05の下端） -->
    <path d="M 945,440 L 945,390 L 1100,390 L 1100,330" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#ah)"/>
  </svg>

  <div class="msg">日々の処理はAIが回す。人の仕事は、最初の設計と、目的に照らした見直しに集約される。</div>
</div>
</body>
</html>
