<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIに任せる — 定型レポートのタスク委任構造</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#EDF0F4;
  font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",system-ui,sans-serif;color:#1a1a1a}
.slide-viewport{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.s{width:1280px;height:720px;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(var(--slide-scale, 1));transform-origin:center center;background:#fff}
.ttl{position:absolute;top:36px;left:64px;font-size:28px;font-weight:700}
.ttl span{font-weight:400;color:#666}
.sub{position:absolute;top:76px;left:64px;font-size:14px;color:#888;font-style:italic}
.hdr-line{position:absolute;top:105px;left:64px;right:64px;height:1px;background:#ddd}
.ai-band{position:absolute;top:385px;left:0;right:0;bottom:54px;background:#E0E4EB}
.card{position:absolute;padding:18px 22px 14px;z-index:1;display:flex;flex-direction:column;justify-content:center}
.h{background:#1a1a1a;color:#fff}
.a{background:#fff;color:#1a1a1a;border:1.5px solid #ccc}
.cn{font-size:13px;opacity:.5;margin-bottom:8px}
.ct{font-size:16px;font-weight:600;margin-bottom:5px;line-height:1.35}
.cd{font-size:12px;opacity:.6;line-height:1.5}
.c01{top:170px;left:80px;width:256px;height:144px}
.c05{top:170px;left:944px;width:256px;height:144px}
.c02{top:430px;left:300px;width:220px;height:190px}
.c03{top:430px;left:550px;width:220px;height:190px}
.c04{top:430px;left:800px;width:220px;height:190px}
.ll{position:absolute;font-size:16px;font-weight:600;color:#999;z-index:1}
.l1{top:230px;left:44px}
.l2{top:485px;left:44px}
svg.ov{position:absolute;top:0;left:0;width:1280px;height:720px;pointer-events:none;z-index:2}
.msg{position:absolute;bottom:0;left:0;right:0;height:54px;background:#1a1a1a;color:#fff;
  display:flex;align-items:center;justify-content:center;padding:0 64px;font-size:13px;letter-spacing:.02em;z-index:1}
</style>
</head>
<body>
<div class="slide-viewport">
<div class="s">
  <div class="ttl"><span>タスク委任パターン</span>｜AIに任せる — アクセス解析の定型レポート</div>
  <div class="sub">ルールが明確で、間違えてもやり直せる仕事</div>
  <div class="hdr-line"></div>

  <div class="ai-band"></div>

  <div class="ll l1">人</div>
  <div class="ll l2">AI</div>

  <div class="card h c01"><div class="cn">01</div><div class="ct">ルールを設計</div><div class="cd">指標・手順・出力形式（初回のみ）</div></div>
  <div class="card h c05"><div class="cn">05</div><div class="ct">定期的に見直す</div><div class="cd">目的に合っているか点検</div></div>
  <div class="card a c02"><div class="cn">02</div><div class="ct">データ取得・集計</div><div class="cd">媒体・ツールから自動取得</div></div>
  <div class="card a c03"><div class="cn">03</div><div class="ct">変化点を抽出</div><div class="cd">前週比・異常値を検出</div></div>
  <div class="card a c04"><div class="cn">04</div><div class="ct">レポート出力</div><div class="cd">仮説候補つきで自動作成</div></div>

  <svg class="ov" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="bk" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8Z" fill="#1a1a1a"/></marker>
      <marker id="gr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8Z" fill="#555"/></marker>
      <marker id="fb" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#888"/></marker>
    </defs>

    <!-- フィードバック破線: 05 → 01 -->
    <text x="640" y="144" fill="#888" font-size="12" font-family="Hiragino Kaku Gothic ProN,system-ui" text-anchor="middle">月次などでルールを更新</text>
    <path d="M 1072,170 L 1072,148 L 208,148 L 208,170" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#fb)"/>

    <!-- 01 → 02: L字コネクタ -->
    <path d="M 208,314 L 208,385 L 410,385 L 410,430" fill="none" stroke="#1a1a1a" stroke-width="2" marker-end="url(#bk)"/>

    <!-- 02 → 03: 横矢印 -->
    <path d="M 520,525 L 550,525" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#gr)"/>

    <!-- 03 → 04: 横矢印 -->
    <path d="M 770,525 L 800,525" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#gr)"/>

    <!-- 04 → 05: L字コネクタ -->
    <path d="M 910,430 L 910,385 L 1072,385 L 1072,314" fill="none" stroke="#1a1a1a" stroke-width="2" marker-end="url(#bk)"/>
  </svg>

  <div class="msg">日々の処理はAIが回す。人の仕事は、最初の設計と、目的に照らした見直しに集約される。</div>
</div>
</div>
<script>
(function(){
  function f(){
    document.documentElement.style.setProperty(
      '--slide-scale',
      Math.min(innerWidth/1280, innerHeight/720)
    );
  }
  addEventListener('resize', f);
  f();
})();
</script>
</body>
</html>
