<html lang="ja">
<meta charset="utf-8">
<title>AI導入プロジェクトの工程時系列</title>
<style>
  html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--page); }

  :root {
    --page: #fff;
    --surface: #FFFFFF;
    --ink: #1C2B3A;
    --ink-2: #55667A;
    --ink-3: #8494A6;
    --border: #D9E0E8;
    --grid: #E4E9F0;
    --accent: #3b7dd8;
    --accent-deep: #2f66b3;
    --accent-soft: #EAF1FC;
  }

  .slide-viewport {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: var(--page); overflow: hidden;
  }
  .slide {
    position: absolute;
    top: 50%; left: 50%;
    width: 1280px;
    height: 720px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(28, 43, 58, 0.08);
    display: flex; flex-direction: column;
    padding: 40px 48px;
    gap: 20px;
    font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", system-ui, -apple-system, sans-serif;
    transform: translate(-50%, -50%) scale(var(--slide-scale, 1));
    transform-origin: center center;
  }

  /* ==== ヘッダ（青いアクセントバー付き） ==== */
  .slide-header {
    display: flex; gap: 14px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .header-accent-bar { flex: 0 0 5px; border-radius: 3px; background: linear-gradient(180deg, var(--accent), var(--accent-deep)); }
  .header-text { display: flex; flex-direction: column; gap: 6px; }
  .slide-title { font-size: 28px; font-weight: 700; line-height: 1.3; color: var(--ink); text-wrap: balance; }
  .slide-desc { font-size: 14px; color: var(--ink-2); line-height: 1.6; }

  /* ==== 時系列全体 ==== */
  .timeline { flex: 1; min-height: 0; display: flex; flex-direction: column; }

  /* ==== 月ヘッダー行 ==== */
  .tl-months {
    display: flex;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .tl-months-spacer { flex: 0 0 240px; }
  .tl-months-right {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
  }
  .tl-month {
    font-size: 13px; font-weight: 700; color: var(--ink-3);
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* ==== 工程行 ==== */
  .tl-row {
    flex: 1;
    display: flex; align-items: stretch;
    border-bottom: 1px solid var(--border);
  }
  .tl-row:last-child { border-bottom: none; }

  .tl-row-left {
    flex: 0 0 240px;
    display: flex; flex-direction: column; gap: 6px;
    justify-content: center;
    padding: 8px 16px 8px 0;
  }
  .tl-process-tag {
    display: inline-block;
    align-self: flex-start;
    background: var(--accent);
    color: #fff;
    font-size: 13px; font-weight: 700;
    padding: 4px 12px;
    border-radius: 4px;
  }
  .tl-desc { font-size: 12px; color: var(--ink-2); line-height: 1.55; }

  .tl-row-right {
    position: relative;
    flex: 1;
    background-image: linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 16.667% 100%;
  }

  /* ==== 矢印バー（先端三角形。CSS clip-path で描画） ==== */
  .tl-bar {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    height: 30px;
    display: flex; align-items: center;
    padding: 0 16px 0 12px;
    background: linear-gradient(90deg, var(--accent-deep), var(--accent));
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 50%, calc(100% - 16px) 100%, 0 100%);
    color: #fff;
    font-size: 11px; font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
  }
  .tl-bar-start,
  .tl-bar-end {
    position: absolute;
    top: calc(50% + 22px);
    font-size: 10.5px;
    color: var(--ink-3);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .tl-bar-end { transform: translateX(-100%); }

  /* ==== メタデータフッター（区切り線 + 下端余白） ==== */
  .slide-meta {
    height: 18px;
    padding-top: 4px;
    border-top: 1px solid var(--border);
  }
</style>

<div class="slide-viewport">
  <div class="slide">

    <header class="slide-header">
      <div class="header-accent-bar"></div>
      <div class="header-text">
        <h1 class="slide-title">AI導入プロジェクトの工程時系列</h1>
        <p class="slide-desc">診断から運用定着まで、各工程の期間と重なりを月軸で配置した全体計画</p>
      </div>
    </header>

    <div class="timeline">

      <div class="tl-months">
        <div class="tl-months-spacer"></div>
        <div class="tl-months-right">
          <span class="tl-month">1月</span>
          <span class="tl-month">2月</span>
          <span class="tl-month">3月</span>
          <span class="tl-month">4月</span>
          <span class="tl-month">5月</span>
          <span class="tl-month">6月</span>
        </div>
      </div>

      <div class="tl-row">
        <div class="tl-row-left">
          <span class="tl-process-tag">現状診断</span>
          <p class="tl-desc">既存コードの可読性・テスト・文書化状態を評価</p>
        </div>
        <div class="tl-row-right">
          <div class="tl-bar" style="left: 2%; width: 22%;">現状診断</div>
          <span class="tl-bar-start" style="left: 2%;">1月</span>
          <span class="tl-bar-end" style="left: 24%;">2月中旬</span>
        </div>
      </div>

      <div class="tl-row">
        <div class="tl-row-left">
          <span class="tl-process-tag">土台整備</span>
          <p class="tl-desc">設計文書の逆生成・テスト基盤の構築</p>
        </div>
        <div class="tl-row-right">
          <div class="tl-bar" style="left: 17%; width: 49%;">土台整備</div>
          <span class="tl-bar-start" style="left: 17%;">2月</span>
          <span class="tl-bar-end" style="left: 66%;">4月</span>
        </div>
      </div>

      <div class="tl-row">
        <div class="tl-row-left">
          <span class="tl-process-tag">ツール導入</span>
          <p class="tl-desc">AIツール選定・権限設定・安全装置構築</p>
        </div>
        <div class="tl-row-right">
          <div class="tl-bar" style="left: 44%; width: 39%;">ツール導入</div>
          <span class="tl-bar-start" style="left: 44%;">3月下旬</span>
          <span class="tl-bar-end" style="left: 83%;">5月</span>
        </div>
      </div>

      <div class="tl-row">
        <div class="tl-row-left">
          <span class="tl-process-tag">運用定着</span>
          <p class="tl-desc">パイロット運用・振り返り・全社展開判定</p>
        </div>
        <div class="tl-row-right">
          <div class="tl-bar" style="left: 67%; width: 31%;">運用定着</div>
          <span class="tl-bar-start" style="left: 67%;">5月</span>
          <span class="tl-bar-end" style="left: 98%;">6月</span>
        </div>
      </div>

    </div>

    <footer class="slide-meta"></footer>

  </div>
</div>

<script>
(function(){
  function f(){
    document.documentElement.style.setProperty(
      '--slide-scale',
      Math.min(innerWidth/1280, innerHeight/720)
    );
  }
  addEventListener('resize', f);
  f();
})();
</script>
</html>
